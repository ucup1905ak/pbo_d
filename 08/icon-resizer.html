<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Resizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a30;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 128px;
  }

  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 560px;
  }

  header {
    margin-bottom: 40px;
  }

  .label-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(232,255,71,0.08);
    border: 1px solid rgba(232,255,71,0.2);
    display: inline-block;
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); }

  .sub {
    font-size: 14px;
    color: var(--muted);
    margin-top: 10px;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
  }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(232,255,71,0.03);
  }

  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    width: 48px; height: 48px;
    margin: 0 auto 16px;
    opacity: 0.5;
  }

  .drop-zone p {
    font-size: 14px; color: var(--muted);
    line-height: 1.6;
  }

  .drop-zone strong { color: var(--accent); font-weight: 500; }

  /* Size inputs */
  .size-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: end;
  }

  .field label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    padding: 12px 14px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  .field input[type="number"]::-webkit-outer-spin-button,
  .field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

  .field input[type="number"]:focus { border-color: var(--accent); }

  .arrow-sep {
    display: flex; align-items: center; justify-content: center;
    padding-bottom: 12px;
    color: var(--muted);
    font-size: 20px;
  }

  /* Presets */
  .preset-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px;
  }

  .preset-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.04);
  }

  /* Resize mode */
  .mode-row {
    display: flex; gap: 8px; margin-top: 20px;
  }

  .mode-btn {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 9px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.07);
  }

  /* Preview */
  .preview-area {
    display: none;
    gap: 24px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .preview-area.show { display: flex; }

  .preview-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .preview-box span {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .img-frame {
    background: repeating-conic-gradient(#222 0% 25%, #1a1a1a 0% 50%) 0 0 / 12px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    padding: 12px;
    min-width: 80px; min-height: 80px;
  }

  .img-frame img { display: block; max-width: 160px; max-height: 160px; image-rendering: pixelated; }

  .arrow-mid {
    color: var(--accent2);
    font-size: 28px;
    margin-top: -20px;
  }

  /* Convert button */
  .btn-convert {
    width: 100%;
    background: var(--accent);
    color: #0d0d0f;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    margin-top: 8px;
  }

  .btn-convert:hover { opacity: 0.9; }
  .btn-convert:active { transform: scale(0.99); }
  .btn-convert:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Results */
  .results {
    display: none;
  }

  .results.show { display: block; }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }

  .result-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .result-item:hover { border-color: var(--accent); }

  .result-item .img-frame { padding: 8px; min-width: 60px; min-height: 60px; }
  .result-item .img-frame img { max-width: 100px; max-height: 100px; }

  .result-info {
    text-align: center;
  }

  .result-info .dim {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
  }

  .result-info .fname {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    word-break: break-all;
  }

  .dl-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .dl-btn:hover { background: rgba(232,255,71,0.08); border-color: var(--accent); }

  .dl-all-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 16px;
  }

  .dl-all-btn:hover { background: rgba(255,107,53,0.07); }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .divider {
    height: 1px; background: var(--border); margin: 8px 0 20px;
  }

  /* Multi-file badge */
  .file-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: rgba(232,255,71,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,255,71,0.2);
    border-radius: 3px;
    padding: 3px 8px;
    margin-top: 10px;
    display: inline-block;
  }

  .progress-bar {
    width: 100%; height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 12px;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">

  <header>
    <div class="label-tag">PNG Tool</div>
    <h1>Icon<br><span>Resizer</span></h1>
    <p class="sub">Resize PNG icons to any dimension — batch supported.</p>
  </header>

  <!-- Upload -->
  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/png" multiple>
      <svg class="drop-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="32" height="32" rx="4" stroke="#666" stroke-width="1.5"/>
        <path d="M24 18V30M24 18L20 22M24 18L28 22" stroke="#e8ff47" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p><strong>Drop PNG files here</strong><br>or click to browse</p>
      <div id="fileCount" class="file-count" style="display:none;"></div>
    </div>

    <div class="preview-area" id="previewArea">
      <div class="preview-box">
        <span>Original</span>
        <div class="img-frame"><img id="previewOrig" src="" alt=""></div>
      </div>
      <div class="arrow-mid">→</div>
      <div class="preview-box">
        <span>Output</span>
        <div class="img-frame"><img id="previewOut" src="" alt=""></div>
      </div>
    </div>
  </div>

  <!-- Size settings -->
  <div class="card">
    <div class="size-row">
      <div class="field">
        <label>Width (px)</label>
        <input type="number" id="outW" value="64" min="1" max="4096">
      </div>
      <div class="arrow-sep">×</div>
      <div class="field">
        <label>Height (px)</label>
        <input type="number" id="outH" value="64" min="1" max="4096">
      </div>
    </div>

    <div class="preset-row">
      <button class="preset-btn" data-w="16" data-h="16">16×16</button>
      <button class="preset-btn" data-w="32" data-h="32">32×32</button>
      <button class="preset-btn" data-w="48" data-h="48">48×48</button>
      <button class="preset-btn" data-w="64" data-h="64">64×64</button>
      <button class="preset-btn" data-w="128" data-h="128">128×128</button>
      <button class="preset-btn" data-w="256" data-h="256">256×256</button>
      <button class="preset-btn" data-w="512" data-h="512">512×512</button>
      <button class="preset-btn" data-w="1024" data-h="1024">1024×1024</button>
    </div>

    <div class="divider"></div>

    <div class="section-title">Resize Mode</div>
    <div class="mode-row">
      <button class="mode-btn active" data-mode="stretch">Stretch</button>
      <button class="mode-btn" data-mode="fit">Fit (letterbox)</button>
      <button class="mode-btn" data-mode="fill">Fill (crop)</button>
    </div>
  </div>

  <!-- Convert -->
  <button class="btn-convert" id="convertBtn" disabled>Convert →</button>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Results -->
  <div class="results card" id="results" style="margin-top:16px;">
    <div class="section-title" id="resultsTitle">Results</div>
    <button class="dl-all-btn" id="dlAllBtn">↓ Download All</button>
    <div class="results-grid" id="resultsGrid"></div>
  </div>

</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const fileCount = document.getElementById('fileCount');
  const previewArea = document.getElementById('previewArea');
  const previewOrig = document.getElementById('previewOrig');
  const previewOut = document.getElementById('previewOut');
  const outW = document.getElementById('outW');
  const outH = document.getElementById('outH');
  const convertBtn = document.getElementById('convertBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const results = document.getElementById('results');
  const resultsGrid = document.getElementById('resultsGrid');
  const resultsTitle = document.getElementById('resultsTitle');
  const dlAllBtn = document.getElementById('dlAllBtn');

  let files = [];
  let mode = 'stretch';
  let resultBlobs = [];

  // Drag & drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const dropped = [...e.dataTransfer.files].filter(f => f.type === 'image/png');
    if (dropped.length) handleFiles(dropped);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFiles([...fileInput.files]);
  });

  function handleFiles(newFiles) {
    files = newFiles;
    fileCount.style.display = 'inline-block';
    fileCount.textContent = files.length === 1 ? `1 file loaded` : `${files.length} files loaded`;

    // Show preview of first file
    const reader = new FileReader();
    reader.onload = e => {
      previewOrig.src = e.target.result;
      previewArea.classList.add('show');
      updatePreview();
    };
    reader.readAsDataURL(files[0]);

    convertBtn.disabled = false;
    results.classList.remove('show');
    resultsGrid.innerHTML = '';
    resultBlobs = [];
  }

  function updatePreview() {
    if (!previewOrig.src || !previewOrig.src.startsWith('data:')) return;
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const w = parseInt(outW.value) || 64;
      const h = parseInt(outH.value) || 64;
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      drawResized(ctx, img, w, h);
      previewOut.src = canvas.toDataURL('image/png');
    };
    img.src = previewOrig.src;
  }

  outW.addEventListener('input', updatePreview);
  outH.addEventListener('input', updatePreview);

  // Presets
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      outW.value = btn.dataset.w;
      outH.value = btn.dataset.h;
      updatePreview();
    });
  });

  // Mode
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      mode = btn.dataset.mode;
      updatePreview();
    });
  });

  function drawResized(ctx, img, w, h) {
    ctx.clearRect(0, 0, w, h);
    if (mode === 'stretch') {
      ctx.drawImage(img, 0, 0, w, h);
    } else if (mode === 'fit') {
      const scale = Math.min(w / img.width, h / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
    } else if (mode === 'fill') {
      const scale = Math.max(w / img.width, h / img.height);
      const dw = img.width * scale, dh = img.height * scale;
      ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
    }
  }

  function resizeFile(file, w, h) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          drawResized(ctx, img, w, h);
          canvas.toBlob(blob => resolve({ blob, name: file.name }), 'image/png');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  convertBtn.addEventListener('click', async () => {
    if (!files.length) return;
    const w = parseInt(outW.value); const h = parseInt(outH.value);
    if (!w || !h || w < 1 || h < 1) return;

    convertBtn.disabled = true;
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';
    results.classList.remove('show');
    resultsGrid.innerHTML = '';
    resultBlobs = [];

    for (let i = 0; i < files.length; i++) {
      const { blob, name } = await resizeFile(files[i], w, h);
      resultBlobs.push({ blob, name: name.replace(/\.png$/i, `_${w}x${h}.png`) });
      progressFill.style.width = `${((i + 1) / files.length) * 100}%`;

      // Add to grid
      const url = URL.createObjectURL(blob);
      const item = document.createElement('div');
      item.className = 'result-item';
      const storedUrl = url;
      const storedName = resultBlobs[resultBlobs.length - 1].name;
      item.innerHTML = `
        <div class="img-frame"><img src="${url}" alt=""></div>
        <div class="result-info">
          <div class="dim">${w}×${h}</div>
          <div class="fname">${storedName}</div>
        </div>
        <button class="dl-btn">↓ Save</button>
      `;
      item.querySelector('.dl-btn').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = storedUrl; a.download = storedName; a.click();
      });
      resultsGrid.appendChild(item);
    }

    resultsTitle.textContent = `Results — ${files.length} file${files.length > 1 ? 's' : ''} at ${w}×${h}`;
    results.classList.add('show');
    convertBtn.disabled = false;
    progressBar.style.display = 'none';
  });

  dlAllBtn.addEventListener('click', async () => {
    if (resultBlobs.length === 1) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(resultBlobs[0].blob);
      a.download = resultBlobs[0].name; a.click();
      return;
    }

    // Use JSZip via CDN for multi-file
    if (resultBlobs.length > 1) {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      script.onload = async () => {
        const zip = new JSZip();
        resultBlobs.forEach(({ blob, name }) => zip.file(name, blob));
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(zipBlob);
        a.download = 'resized_icons.zip'; a.click();
      };
      document.head.appendChild(script);
    }
  });
</script>
</body>
</html>
